<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIBERTY Dental Plan – Member Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Roboto',sans-serif;background:#f0f2f8;font-size:16px}
body{overflow-x:hidden}

/* ══ TOP BAR ══ */
.top-bar{background:#3352a3;color:#fff;padding:5px 0;font-size:13px}
.tb-inner{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:flex-end;gap:16px}
.tb-sep{opacity:.3;font-size:18px}
.tb-fontlabel{opacity:.85}
.tb-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;border-radius:3px;width:24px;height:22px;font-size:13px;transition:background .15s;display:inline-flex;align-items:center;justify-content:center}
.tb-btn:hover{background:rgba(255,255,255,.15)}
.lang-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.9;transition:opacity .15s}
.lang-wrap:hover{opacity:1}
.lang-icon{width:16px;height:16px;vertical-align:middle}

/* ══ HEADER ══ */
.site-header{background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.09);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1280px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.logo-img{height:48px;display:block}
.nav-right{display:flex;align-items:center;gap:12px}
.btn-emergency{background:none;border:2px solid #3352a3;color:#3352a3;border-radius:4px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn-emergency:hover{background:#3352a3;color:#fff}
.btn-signout{background:none;border:1px solid #dc3545;color:#dc3545;border-radius:4px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-signout:hover{background:#dc3545;color:#fff}
.btn-signout i{margin-right:5px}

/* ══ MAIN LAYOUT ══ */
.page-main{flex:1}
.hero-layout{max-width:1280px;margin:0 auto;padding:48px 20px 60px;display:grid;grid-template-columns:1fr 420px;gap:64px;align-items:start}
@media(max-width:960px){.hero-layout{grid-template-columns:1fr;gap:28px}}

/* ══ ALERT BANNERS ══ */
.alert-info{background:#e8edf8;border-left:4px solid #3352a3;border-radius:4px;padding:11px 40px 11px 14px;font-size:14px;display:flex;align-items:flex-start;gap:10px;position:relative;margin-bottom:12px;line-height:1.5}
.alert-info img{flex-shrink:0;width:18px;height:18px;margin-top:2px}
.alert-warning{background:#fff8e1;border-left:4px solid #f59e0b;border-radius:4px;padding:11px 40px 11px 14px;font-size:14px;display:flex;align-items:flex-start;gap:10px;position:relative;margin-bottom:12px;line-height:1.5}
.alert-warning i{color:#f59e0b;font-size:16px;flex-shrink:0;margin-top:2px}
.alert-close{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:18px;line-height:1}
.alert-close:hover{color:#333}

/* ══ HERO TEXT ══ */
.hero-title{font-family:'Nunito',sans-serif;font-size:clamp(34px,4.5vw,52px);font-weight:900;color:#1a2340;line-height:1.12;margin-bottom:18px}
.hero-title .accent{color:#602D86}
.hero-subtitle{font-size:16px;color:#4a5568;line-height:1.85;max-width:480px;margin-bottom:28px}
.hero-features{display:flex;flex-direction:column;gap:14px}
.hf-item{display:flex;align-items:center;gap:14px}
.hf-icon{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#e8edf8,#d0d9f2);display:flex;align-items:center;justify-content:center;color:#3352a3;font-size:17px;flex-shrink:0}
.hf-text h4{font-size:14px;font-weight:700;color:#1a2340;margin-bottom:2px}
.hf-text p{font-size:13px;color:#6b7280}

/* ══ LOGIN CARD ══ */
.lc-wrap{display:flex;flex-direction:column;gap:12px}
.login-card{background:#fff;border-radius:8px;box-shadow:0 2px 24px rgba(51,82,163,.12);overflow:hidden}
.lc-header{background:#3352a3;color:#fff;padding:15px 24px;text-align:center;font-size:17px;font-weight:700;letter-spacing:.4px;display:flex;align-items:center;justify-content:center;gap:8px}
.lc-body{padding:24px 26px 22px}

/* form */
.fg{margin-bottom:15px}
.fg label{display:block;font-size:13px;font-weight:700;color:#333;margin-bottom:6px}
.fg input{width:100%;padding:10px 13px;border:1px solid #ccc;border-radius:4px;font-size:15px;color:#333;background:#fff;transition:border-color .15s,box-shadow .15s;font-family:'Roboto',sans-serif}
.fg input:focus{outline:none;border-color:#3352a3;box-shadow:0 0 0 3px rgba(51,82,163,.1)}
.fg input.err{border-color:#dc3545}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.pw-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:14px;padding:2px}
.pw-eye:hover{color:#3352a3}

.err-box{background:#fff3f3;border:1px solid #f5c6cb;border-radius:4px;color:#721c24;padding:10px 13px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.err-box i{flex-shrink:0;margin-top:1px}
.success-box{background:#d4edda;border:1px solid #c3e6cb;border-radius:4px;color:#155724;padding:13px 16px;font-size:14px;text-align:center;line-height:1.6}
.success-box i{margin-right:6px}

/* buttons */
.btn-primary{width:100%;background:#3352a3;color:#fff;border:none;border-radius:4px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.2px;font-family:'Roboto',sans-serif}
.btn-primary:hover:not(:disabled){background:#2a4490}
.btn-primary:disabled{background:#81a0f1;cursor:not-allowed}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.btn-ms{width:100%;background:#fff;border:1px solid #d0d0d0;border-radius:4px;padding:10px 14px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;color:#333;transition:border-color .18s,box-shadow .18s;font-family:'Roboto',sans-serif;margin-bottom:12px}
.btn-ms:hover:not(:disabled){border-color:#3352a3;box-shadow:0 0 0 2px rgba(51,82,163,.1)}
.btn-ms:disabled{opacity:.6;cursor:not-allowed}
.ms-icon{width:18px;height:18px;flex-shrink:0}

.btn-outline{width:100%;background:#fff;color:#3352a3;border:2px solid #3352a3;border-radius:4px;padding:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;font-family:'Roboto',sans-serif}
.btn-outline:hover{background:#3352a3;color:#fff}

.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#aaa;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e8e8e8}

.forgot-row{display:flex;justify-content:space-between;margin-top:12px;font-size:13px}
.link{color:#3352a3;cursor:pointer;text-decoration:none;font-weight:500}
.link:hover{text-decoration:underline}
.back-link{display:inline-flex;align-items:center;gap:6px;color:#3352a3;font-size:13px;cursor:pointer;margin-bottom:18px;font-weight:600;background:none;border:none;padding:0}
.back-link:hover{text-decoration:underline}

.or-redirect{text-align:center;margin-top:14px;font-size:12px;color:#999}
.or-redirect a{color:#3352a3;cursor:pointer}
.or-redirect a:hover{text-decoration:underline}

/* ══ DASHBOARD ══ */
.dash-wrap{max-width:1280px;margin:0 auto;padding:36px 20px 60px}
.dash-greeting{margin-bottom:28px}
.dash-greeting h2{font-family:'Nunito',sans-serif;font-size:28px;font-weight:800;color:#1a2340}
.dash-greeting p{color:#6b7280;font-size:15px;margin-top:4px}
.dash-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.d-card{background:#fff;border-radius:8px;box-shadow:0 1px 8px rgba(0,0,0,.07);padding:22px 16px;cursor:pointer;transition:transform .2s,box-shadow .2s;text-align:center;border-top:3px solid transparent}
.d-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1);border-top-color:#3352a3}
.d-card-icon{width:50px;height:50px;border-radius:50%;background:#eef1fc;display:flex;align-items:center;justify-content:center;color:#3352a3;font-size:20px;margin:0 auto 12px}
.d-card h3{font-size:14px;font-weight:700;color:#1a2340;margin-bottom:4px}
.d-card p{font-size:12px;color:#9ca3af}
.dash-info{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.dash-cards{grid-template-columns:repeat(2,1fr)}.dash-info{grid-template-columns:1fr}}
.d-info-card{background:#fff;border-radius:8px;box-shadow:0 1px 8px rgba(0,0,0,.07);padding:20px}
.d-info-card h4{font-size:13px;font-weight:700;color:#3352a3;border-bottom:1px solid #f0f0f0;padding-bottom:10px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.d-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 0;border-bottom:1px solid #f7f7f7}
.d-row:last-child{border-bottom:none}
.d-row span:first-child{color:#6b7280}
.d-row strong{color:#1a2340;font-size:13px;word-break:break-all;text-align:right;max-width:65%}
.badge-active{background:#d1fae5;color:#065f46;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;white-space:nowrap}
.badge-verified{background:#dbeafe;color:#1e40af;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px}

/* ══ FOOTER ══ */
.site-footer{background:#1e2d5a;color:#9ba5c5;margin-top:60px}
.footer-main{max-width:1280px;margin:0 auto;padding:48px 20px 32px;display:grid;grid-template-columns:1.5fr repeat(4,1fr);gap:32px}
@media(max-width:900px){.footer-main{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.footer-main{grid-template-columns:1fr}}
.footer-logo-img{height:44px;margin-bottom:10px;display:block}
.footer-tagline{font-size:13px;line-height:1.7;color:#6b7a9e}
.footer-col h5{color:#e2e8f0;font-size:13px;font-weight:700;margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase}
.footer-col ul{list-style:none}
.footer-col ul li{margin-bottom:8px}
.footer-col ul li a{color:#7a87ad;text-decoration:none;font-size:13px;transition:color .15s}
.footer-col ul li a:hover{color:#fff}
.footer-bottom{border-top:1px solid rgba(255,255,255,.07);padding:16px 20px}
.footer-bottom-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:12px}
.footer-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{color:#6b7a9e;text-decoration:none;transition:color .15s;font-size:12px;display:flex;align-items:center;gap:5px}
.footer-links a:hover{color:#fff}
.footer-social{display:flex;gap:14px}
.footer-social a{color:#6b7a9e;font-size:16px;transition:color .15s}
.footer-social a:hover{color:#fff}
.scroll-top{color:#6b7a9e;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;transition:color .15s}
.scroll-top:hover{color:#fff}

/* ══ PAGE LOADER ══ */
.page-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#4a5568}
.page-loader .big-spin{width:44px;height:44px;border:3px solid #e0e6f5;border-top-color:#3352a3;border-radius:50%;animation:spin .8s linear infinite}
.page-loader p{font-size:15px}

/* ══ MEMBER REGISTRATION FLOW ══ */
.reg-info{background:#f0f4ff;border-radius:6px;padding:14px 16px;margin-bottom:18px}
.reg-info-title{font-size:13px;font-weight:700;color:#3352a3;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.reg-info ul{font-size:13px;color:#555;line-height:1.9;padding-left:18px}
.reg-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.reg-step{display:flex;gap:12px;align-items:flex-start;font-size:14px;color:#444}
.reg-step-num{width:22px;height:22px;border-radius:50%;background:#3352a3;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* ══ REGISTER TABS ══ */
.auth-note{text-align:center;font-size:12px;color:#888;margin-top:12px}

/* Responsive */
@media(max-width:600px){
  .hero-layout{padding:24px 16px 40px}
  .lc-body{padding:18px 16px 16px}
  .footer-main{padding:32px 16px 24px}
  .dash-wrap{padding:24px 16px 40px}
}
</style>
</head>

<div id="root" style="display:flex;flex-direction:column;min-height:100vh"></div>

/* ════════════════════════════════════════════
   SIGN IN VIEW  
   (Microsoft popup + redirect, username hint)
   ════════════════════════════════════════════ */
function SignInView({ onAuth, onGo }) {
  const [username, setUsername] = useState("");
  const [pw, setPw]             = useState("");
  const [showPw, setShowPw]     = useState(false);
  const [loading, setLoading]   = useState(false);
  const [msLoad, setMsLoad]     = useState(false);
  const [err, setErr]           = useState("");

  /* Interactive popup (recommended for CIAM) */
  const signInPopup = async () => {
    setErr(""); setMsLoad(true);
    try {
      const inst = await getMsal();
      const req = { ...SCOPES };
      if (username.trim()) req.loginHint = username.trim();
      const res = await inst.loginPopup(req);
      onAuth(res.account, res.accessToken);
    } catch (e) {
      if (e.errorCode !== "user_cancelled" && e.errorCode !== "popup_window_error") {
        setErr(e.message || "Sign-in failed. Please try again.");
      }
    } finally { setMsLoad(false); }
  };

  /* Redirect fallback */
  const signInRedirect = async () => {
    setErr("");
    try {
      const inst = await getMsal();
      const req = { ...SCOPES };
      if (username.trim()) req.loginHint = username.trim();
      await inst.loginRedirect(req);
    } catch (e) {
      setErr(e.message || "Redirect failed.");
    }
  };

  /* Form-assisted: pre-fill login_hint then open popup */
  const signInWithCreds = async () => {
    setErr("");
    if (!username.trim()) { setErr("Please enter your username or email."); return; }
    setLoading(true);
    try {
      const inst = await getMsal();
      const res = await inst.loginPopup({
        ...SCOPES,
        loginHint: username.trim(),
        prompt: "login",
      });
      onAuth(res.account, res.accessToken);
    } catch (e) {
      if (e.errorCode !== "user_cancelled") {
        setErr(e.message || "Sign-in failed. Please check your credentials.");
      }
    } finally { setLoading(false); }
  };

  return (
    <div className="login-card">
      <div className="lc-header">
        <i className="fa-solid fa-shield-halved"/>
        Member Login
      </div>
      <div className="lc-body">
        <ErrBox msg={err} />

        <MSButton onClick={signInPopup} disabled={loading} loading={msLoad}
          label={msLoad ? "Signing in…" : "Sign in with Microsoft"} />

        <div className="divider">or enter your username</div>

        <div className="fg">
          <label htmlFor="si-username">Username / Email</label>
          <input id="si-username" type="text" placeholder="Your username or email"
            value={username} onChange={e => setUsername(e.target.value)}
            onKeyDown={e => e.key==="Enter" && signInWithCreds()}
            className={err && !username ? "err" : ""} autoFocus autoComplete="username" />
        </div>

        <div className="fg">
          <label htmlFor="si-pw">Password</label>
          <div className="pw-wrap">
            <input id="si-pw" type={showPw ? "text" : "password"} placeholder="Your password"
              value={pw} onChange={e => setPw(e.target.value)}
              onKeyDown={e => e.key==="Enter" && signInWithCreds()}
              autoComplete="current-password" />
            <button className="pw-eye" tabIndex={-1} type="button"
              onClick={() => setShowPw(v => !v)} aria-label={showPw ? "Hide password" : "Show password"}>
              <i className={`fa-solid fa-eye${showPw ? "-slash" : ""}`}/>
            </button>
          </div>
        </div>

        <button className="btn-primary" onClick={signInWithCreds} disabled={loading || msLoad}>
          {loading ? <Spinner /> : null}
          {loading ? "Signing in…" : "Login"}
        </button>

        <div className="forgot-row">
          <span className="link" onClick={() => onGo("forgotPw")} role="button" tabIndex={0}
            onKeyDown={e => e.key==="Enter" && onGo("forgotPw")}>Forgot Password?</span>
          <span className="link" onClick={() => onGo("forgotUser")} role="button" tabIndex={0}
            onKeyDown={e => e.key==="Enter" && onGo("forgotUser")}>Forgot Username?</span>
        </div>

        <div className="divider">New Member?</div>
        <p style={{textAlign:"center",fontSize:13,color:"#555",marginBottom:10}}>
          Click here to access your account
        </p>
        <button className="btn-outline" onClick={() => onGo("register")}>Register Now</button>

        <p className="or-redirect">
          Having trouble with the popup?{" "}
          <a onClick={signInRedirect} tabIndex={0} role="button"
            onKeyDown={e => e.key==="Enter" && signInRedirect()}>Sign in with redirect instead</a>
        </p>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   FORGOT PASSWORD VIEW
   (CIAM SSPR via loginPopup with prompt=reset_password)
   ════════════════════════════════════════════ */
function ForgotPasswordView({ onBack }) {
  const [email, setEmail]     = useState("");
  const [loading, setLoading] = useState(false);
  const [done, setDone]       = useState(false);
  const [err, setErr]         = useState("");

  const doReset = async () => {
    setErr("");
    if (!email.includes("@") || email.length < 5) {
      setErr("Please enter a valid email address."); return;
    }
    setLoading(true);
    try {
      const inst = await getMsal();
      /* CIAM supports native password reset via extraQueryParameters */
      await inst.loginPopup({
        ...SCOPES,
        loginHint: email.trim(),
        extraQueryParameters: { prompt: "reset_password" },
        prompt: "login",
      });
      setDone(true);
    } catch (e) {
      if (e.errorCode === "user_cancelled") {
        setErr("Password reset was cancelled. Please try again.");
      } else if (e.message?.includes("AADB2C")) {
        /* Fallback: open SSPR portal */
        window.open("https://aka.ms/sspr", "_blank");
        setDone(true);
      } else {
        setErr(e.message || "Reset failed. Please contact support.");
      }
    } finally { setLoading(false); }
  };

  return (
    <div className="login-card">
      <div className="lc-header"><i className="fa-solid fa-key"/>Reset Password</div>
      <div className="lc-body">
        <button className="back-link" onClick={onBack} type="button">
          <i className="fa-solid fa-arrow-left"/>Back to sign in
        </button>
        {done ? (
          <div className="success-box">
            <i className="fa-solid fa-circle-check"/>
            Password reset initiated. Follow the instructions in the pop-up or check your email for a reset link.
            <br/><br/>
            <span className="link" onClick={onBack} role="button" tabIndex={0}
              onKeyDown={e => e.key==="Enter" && onBack()}>← Back to sign in</span>
          </div>
        ) : (
          <>
            <ErrBox msg={err} />
            <p style={{fontSize:14,color:"#555",lineHeight:1.7,marginBottom:16}}>
              Enter the email address associated with your account. You'll be guided through a secure password reset flow.
            </p>
            <div className="fg">
              <label htmlFor="fp-email">Registered Email Address</label>
              <input id="fp-email" type="email" placeholder="your@email.com"
                value={email} onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key==="Enter" && doReset()}
                className={err ? "err" : ""} autoFocus autoComplete="email" />
            </div>
            <button className="btn-primary" onClick={doReset} disabled={loading}>
              {loading ? <Spinner /> : <i className="fa-solid fa-paper-plane"/>}
              {loading ? "Processing…" : "Reset Password"}
            </button>
            <div style={{marginTop:14,textAlign:"center",fontSize:13,color:"#888"}}>
              Need additional help?{" "}
              <a href="https://www.libertydentalplan.com/Members/Member---Contact-Us.aspx"
                 target="_blank" rel="noreferrer" className="link">Contact Member Services</a>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   FORGOT USERNAME VIEW
   (Look up account by email; sign in with hint)
   ════════════════════════════════════════════ */
function ForgotUsernameView({ onBack }) {
  const [email, setEmail]     = useState("");
  const [loading, setLoading] = useState(false);
  const [done, setDone]       = useState(false);
  const [err, setErr]         = useState("");

  const doLookup = async () => {
    setErr("");
    if (!email.includes("@") || email.length < 5) {
      setErr("Please enter a valid email address."); return;
    }
    setLoading(true);
    try {
      /*
        For CIAM, username retrieval is done by signing in with the email
        as the login_hint. The user sees their account in the CIAM UI.
        We open a popup with the email pre-filled so they can identify themselves.
      */
      const inst = await getMsal();
      await inst.loginPopup({
        ...SCOPES,
        loginHint: email.trim(),
        prompt: "login",
      });
      setDone(true);
    } catch (e) {
      if (e.errorCode === "user_cancelled") {
        setErr("Lookup was cancelled.");
      } else {
        setErr(e.message || "Lookup failed. Please contact support.");
      }
    } finally { setLoading(false); }
  };

  return (
    <div className="login-card">
      <div className="lc-header"><i className="fa-solid fa-user-magnifying-glass"/>Forgot Username?</div>
      <div className="lc-body">
        <button className="back-link" onClick={onBack} type="button">

        </button>
        {done ? (
          <div className="success-box">
            <i className="fa-solid fa-circle-check"/>

            <br/><br/>
            <span className="link" onClick={onBack} role="button" tabIndex={0}
              onKeyDown={e => e.key==="Enter" && onBack()}>← Return to sign in</span>
          </div>
        ) : (
          <>
            <ErrBox msg={err} />
            <p style={{fontSize:14,color:"#555",lineHeight:1.7,marginBottom:16}}>
              Enter your registered email address. We'll open a secure window to help you identify your account username.
            </p>
            <div className="fg">
              <label htmlFor="fu-email">Registered Email Address</label>
              <input id="fu-email" type="email" placeholder="your@email.com"
                value={email} onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key==="Enter" && doLookup()}
                className={err ? "err" : ""} autoFocus autoComplete="email" />
            </div>
            <button className="btn-primary" onClick={doLookup} disabled={loading}>
              {loading ? <Spinner /> : <i className="fa-solid fa-magnifying-glass"/>}
              {loading ? "Looking up…" : "Find My Account"}
            </button>
            <div style={{marginTop:14,textAlign:"center",fontSize:13,color:"#888"}}>
              Still need help?{" "}
              <a href="tel:8887036999" className="link">Call 888.703.6999</a>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

            <a href="https://www.libertydentalplan.com/Legal/Grievances.aspx" target="_blank" rel="noreferrer">Grievance Forms</a>

            </a>
          </div>
          <div className="footer-social">
            <a href="https://www.instagram.com/libertydentalplan" target="_blank" rel="noreferrer" aria-label="Instagram"><i className="fab fa-instagram"/></a>
            <a href="https://www.facebook.com/libertydentalplan" target="_blank" rel="noreferrer" aria-label="Facebook"><i className="fab fa-facebook-f"/></a>

/* ════════════════════════════════════════════
   ROOT APP
   ════════════════════════════════════════════ */
function App() {
  const [account, setAccount]   = useState(null);
  const [ready, setReady]       = useState(false);
  const [view, setView]         = useState("signin");   // signin | register | forgotPw | forgotUser
  const [alert1, setAlert1]     = useState(true);
  const [alert2, setAlert2]     = useState(true);

  /* Handle redirect callback on page load */
  useEffect(() => {
    (async () => {
      try {
        const inst = await getMsal();
        const res  = await inst.handleRedirectPromise();
        if (res?.account) {
          setAccount(res.account);
        } else {
          const accounts = inst.getAllAccounts();
          if (accounts.length) setAccount(accounts[0]);
        }
      } catch (e) {
        console.error("[MSAL] init error:", e);
      } finally {
        setReady(true);
      }
    })();
  }, []);

  const handleAuth = useCallback((acc) => {
    setAccount(acc);
    setView("signin");
  }, []);

  const handleSignOut = useCallback(async () => {
    try {
      const inst = await getMsal();
      await inst.logoutPopup({ account });
    } catch(e) { console.error("[MSAL] logout:", e); }
    setAccount(null);
  }, [account]);

  if (!ready) {
    return (
      <div className="page-loader" role="status" aria-live="polite">
        <div className="big-spin" aria-hidden="true"/>
        <p>Loading portal…</p>
      </div>
    );
  }

  const rightPanel = () => {
    if (view === "register")   return <RegisterView      onBack={() => setView("signin")} onAuth={handleAuth} />;
    if (view === "forgotPw")   return <ForgotPasswordView onBack={() => setView("signin")} />;
    if (view === "forgotUser") return <ForgotUsernameView onBack={() => setView("signin")} />;
    return <SignInView onAuth={handleAuth} onGo={setView} />;
  };

  return (
    <>
      <TopBar />
      <Header account={account} onSignOut={handleSignOut} />
      <main className="page-main">
        {account ? (
          <Dashboard account={account} />
        ) : (
          <div className="hero-layout">
            {/* ── Left: hero ── */}
            <Hero />
            {/* ── Right: auth panel ── */}
            <div className="lc-wrap">
              {view === "signin" && (
                <>
                  {alert1 && (
                    <div className="alert-info" role="alert">
                      <img src={window.ASSETS.infoIcon} alt="" aria-hidden="true"/>
                      <span>Para obtener ayuda en español, llame al <strong>888.703.6999</strong></span>
                      <button className="alert-close" onClick={() => setAlert1(false)} aria-label="Close">×</button>
                    </div>
                  )}
                  {alert2 && (
                    <div className="alert-warning" role="alert">
                      <i className="fa-solid fa-triangle-exclamation" aria-hidden="true"/>
                      <span>Please <strong>re-register</strong> with a new username and password the <strong>first time</strong> you login to the new Portal and App.</span>
                      <button className="alert-close" onClick={() => setAlert2(false)} aria-label="Close">×</button>
                    </div>
                  )}
                </>
              )}
              {rightPanel()}
            </div>
          </div>
        )}
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
