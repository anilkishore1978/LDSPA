<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIBERTY Dental Plan – Member Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Roboto',sans-serif;background:#edf1f8;min-height:100vh}
#root{display:flex;flex-direction:column;min-height:100vh}

/* TOP BAR */
.topbar{background:#3352a3;color:#fff;padding:5px 0}
.tb-in{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:flex-end;gap:12px;font-size:13px}
.tb-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;border-radius:3px;width:24px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.tb-btn:hover{background:rgba(255,255,255,.18)}

/* HEADER */
.site-header{background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.09);position:sticky;top:0;z-index:200}
.nav-in{max-width:1280px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.logo-img{height:48px;display:block}
.nav-right{display:flex;align-items:center;gap:8px}
.btn-emg{background:none;border:2px solid #3352a3;color:#3352a3;border-radius:4px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-emg:hover{background:#3352a3;color:#fff}
.btn-out{background:none;border:1px solid #dc3545;color:#dc3545;border-radius:4px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-out:hover{background:#dc3545;color:#fff}

/* CORS WARNING */
.cors-bar{background:#7c3aed;color:#fff;padding:8px 20px;font-size:12px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
.cors-bar code{background:rgba(255,255,255,.2);padding:1px 6px;border-radius:3px;font-size:11px}

/* ALERTS */
.al{border-radius:4px;padding:10px 38px 10px 13px;font-size:14px;display:flex;align-items:flex-start;gap:9px;position:relative;margin-bottom:10px;line-height:1.5}
.al-info{background:#e8edf8;border-left:4px solid #3352a3}
.al-warn{background:#fffbeb;border-left:4px solid #f59e0b}
.al-x{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:17px;color:#888;line-height:1;padding:0}
.al-x:hover{color:#333}

/* HERO */
.hero-layout{max-width:1280px;margin:0 auto;padding:44px 20px 60px;display:grid;grid-template-columns:1fr 440px;gap:56px;align-items:start}
@media(max-width:960px){.hero-layout{grid-template-columns:1fr;gap:24px}}
.hero-title{font-family:'Nunito',sans-serif;font-size:clamp(32px,4vw,50px);font-weight:900;color:#1a2340;line-height:1.12;margin-bottom:14px}
.hero-acc{color:#602D86}
.hero-sub{font-size:15px;color:#4a5568;line-height:1.85;max-width:480px;margin-bottom:24px}
.hero-feats{display:flex;flex-direction:column;gap:13px}
.hf{display:flex;align-items:center;gap:13px}
.hf-ic{width:38px;height:38px;border-radius:50%;background:#eaedfa;display:flex;align-items:center;justify-content:center;color:#3352a3;font-size:17px;flex-shrink:0}
.hf-t{font-size:14px;font-weight:700;color:#1a2340;margin-bottom:2px}
.hf-d{font-size:12px;color:#7280a0}

/* AUTH CARD */
.acard{background:#fff;border-radius:10px;box-shadow:0 4px 28px rgba(51,82,163,.12);overflow:hidden}
.acard-head{background:#3352a3;color:#fff;padding:14px 22px;text-align:center;font-size:17px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:8px}
.acard-body{padding:22px 24px 20px}

/* STEP DOTS */
.steps-row{display:flex;align-items:center;margin-bottom:20px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;position:relative}
.step-item:not(:last-child)::after{content:'';position:absolute;top:11px;left:50%;width:100%;height:1px;background:#e0e0e0;z-index:0}
.step-item.s-done:not(:last-child)::after,.step-item.s-act:not(:last-child)::after{background:#c7d4f0}
.step-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;z-index:1}
.s-done .step-dot{background:#3352a3;color:#fff}
.s-act  .step-dot{background:#3352a3;color:#fff;box-shadow:0 0 0 3px rgba(51,82,163,.18)}
.s-idle .step-dot{background:#e8e8e8;color:#aaa}
.step-lbl{font-size:10px;font-weight:600;color:#aaa;white-space:nowrap}
.s-done .step-lbl,.s-act .step-lbl{color:#3352a3}

/* FORM FIELDS */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;font-weight:700;color:#333;margin-bottom:5px}
.fg input[type=text],.fg input[type=email],.fg input[type=password]{width:100%;padding:10px 13px;border:1px solid #ccc;border-radius:4px;font-size:15px;color:#333;background:#fff;transition:border .15s,box-shadow .15s;font-family:inherit}
.fg input:focus{outline:none;border-color:#3352a3;box-shadow:0 0 0 3px rgba(51,82,163,.1)}
.fg input.ferr{border-color:#dc3545}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:14px;padding:0}
.pw-toggle:hover{color:#3352a3}

/* PASSWORD STRENGTH */
.pw-str{margin-top:6px}
.str-bars{display:flex;gap:4px;margin-bottom:3px}
.str-bar{height:4px;flex:1;border-radius:2px;background:#e8e8e8;transition:background .3s}
.str-bar.lv1{background:#ef4444}
.str-bar.lv2{background:#f59e0b}
.str-bar.lv3{background:#10b981}
.str-bar.lv4{background:#059669}
.str-lbl{font-size:11px;color:#888}

/* OTP INPUT */
.otp-wrap{display:flex;gap:8px;justify-content:center;margin:16px 0}
.otp-box{width:42px;height:50px;border:2px solid #ddd;border-radius:6px;text-align:center;font-size:22px;font-weight:700;color:#1a2340;background:#fff;outline:none;transition:border .15s;caret-color:transparent}
.otp-box:focus{border-color:#3352a3;box-shadow:0 0 0 3px rgba(51,82,163,.12)}
.otp-box.filled{border-color:#3352a3;background:#f0f4ff}
.otp-hint{text-align:center;font-size:13px;color:#555;margin-bottom:4px;line-height:1.5}
.otp-target{font-weight:700;color:#3352a3}
.otp-resend{text-align:center;margin-top:10px;font-size:13px;color:#888}

/* BUTTONS */
.btn-prim{width:100%;background:#3352a3;color:#fff;border:none;border-radius:4px;padding:11px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.btn-prim:hover:not(:disabled){background:#2a4490}
.btn-prim:disabled{background:#a3b4e0;cursor:not-allowed}
.btn-sec{width:100%;background:#fff;color:#3352a3;border:2px solid #3352a3;border-radius:4px;padding:9px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-sec:hover{background:#3352a3;color:#fff}
.btn-ghost{background:none;border:none;color:#3352a3;font-size:13px;cursor:pointer;font-weight:600;padding:0;font-family:inherit}
.btn-ghost:hover{text-decoration:underline}
.btn-back{background:none;border:none;color:#3352a3;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:600;margin-bottom:14px;font-family:inherit;padding:0}
.btn-back:hover{text-decoration:underline}
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* MISC */
.dvdr{display:flex;align-items:center;gap:10px;margin:14px 0;color:#ccc;font-size:12px}
.dvdr::before,.dvdr::after{content:'';flex:1;height:1px;background:#eee}
.link-row{display:flex;justify-content:space-between;margin-top:11px;font-size:13px}
.lnk{color:#3352a3;cursor:pointer;font-weight:600}
.lnk:hover{text-decoration:underline}

/* MESSAGES */
.m-err{background:#fff3f3;border:1px solid #fcc;border-radius:4px;color:#721c24;padding:10px 12px;font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.m-err i{flex-shrink:0;margin-top:2px}
.m-ok{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;color:#14532d;padding:16px;font-size:14px;text-align:center;line-height:1.7}
.m-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;color:#1e40af;padding:11px 13px;font-size:13px;line-height:1.6;margin-bottom:13px}

/* DASHBOARD */
.dash{max-width:1280px;margin:0 auto;padding:36px 20px 60px}
.dash-greet{margin-bottom:24px}
.dash-greet h2{font-family:'Nunito',sans-serif;font-size:28px;font-weight:800;color:#1a2340}
.dash-greet p{color:#6b7280;font-size:15px;margin-top:4px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:13px;margin-bottom:22px}
.dcard{background:#fff;border-radius:8px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:18px 14px;cursor:pointer;transition:transform .2s,box-shadow .2s;text-align:center;border-top:3px solid transparent}
.dcard:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.1);border-top-color:#3352a3}
.dcard-ic{width:46px;height:46px;border-radius:50%;background:#eaedfa;display:flex;align-items:center;justify-content:center;color:#3352a3;font-size:19px;margin:0 auto 10px}
.dcard h3{font-size:13px;font-weight:700;color:#1a2340;margin-bottom:3px}
.dcard p{font-size:11px;color:#9ca3af}
.dash-info{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.dash-info{grid-template-columns:1fr}}
.di-card{background:#fff;border-radius:8px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:18px}
.di-card h4{font-size:13px;font-weight:700;color:#3352a3;border-bottom:1px solid #f0f0f0;padding-bottom:9px;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.di-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid #f8f8f8}
.di-row:last-child{border-bottom:none}
.di-row span{color:#6b7280}
.di-row strong{color:#1a2340;font-size:12px;word-break:break-all;text-align:right;max-width:65%}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;display:inline-block}
.bg-green{background:#d1fae5;color:#065f46}
.bg-blue{background:#dbeafe;color:#1e40af}
.bg-purple{background:#ede9fe;color:#5b21b6}
.token-pre{background:#1e2d5a;border-radius:5px;padding:10px;font-size:10px;font-family:monospace;color:#7dd3fc;word-break:break-all;max-height:72px;overflow-y:auto;margin-top:6px}

/* FOOTER */
.footer{background:#1a2849;color:#8895b5;margin-top:auto}
.fi{max-width:1280px;margin:0 auto;padding:44px 20px 28px;display:grid;grid-template-columns:1.4fr repeat(4,1fr);gap:28px}
@media(max-width:900px){.fi{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.fi{grid-template-columns:1fr}}
.f-logo{height:40px;margin-bottom:10px;display:block}
.f-tag{font-size:12px;line-height:1.75;color:#5a6a8a}
.fcol h5{color:#e2e8f0;font-size:12px;font-weight:700;margin-bottom:11px;letter-spacing:.5px;text-transform:uppercase}
.fcol ul{list-style:none}
.fcol li{margin-bottom:8px}
.fcol a{color:#6a7a9e;text-decoration:none;font-size:12px;transition:color .15s}
.fcol a:hover{color:#fff}
.f-bot{border-top:1px solid rgba(255,255,255,.06)}
.f-bot-in{max-width:1280px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:11px}
.f-links{display:flex;gap:16px;flex-wrap:wrap}
.f-links a{color:#5a6a8a;text-decoration:none;font-size:11px;transition:color .15s}
.f-links a:hover{color:#fff}
.f-soc{display:flex;gap:12px}
.f-soc a{color:#5a6a8a;font-size:14px;transition:color .15s}
.f-soc a:hover{color:#fff}

/* PAGE LOAD */
.page-load{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:14px;color:#6b7280}
.big-spin{width:40px;height:40px;border:3px solid #e0e6f5;border-top-color:#3352a3;border-radius:50%;animation:spin .85s linear infinite}
</style>
</head>

const BASE = `https://${TENANT_SUB}.ciamlogin.com/${TENANT_ID}`;

async function naPost(path, params) {
  const url  = PROXY ? (PROXY + path) : (BASE + path);
  const body = new URLSearchParams({ client_id: CLIENT_ID, ...params });
  let res;
  try {
    res = await fetch(url, {
      method : "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body   : body.toString(),
    });
  } catch (e) {
    throw { code: "network_error", desc: PROXY
      ? "Network error. Check proxy-server.js is running."
      : "Native Auth API blocks CORS. Set PROXY in window.NA_CONFIG and start proxy-server.js." };
  }
  const json = await res.json();
  if (json.error && json.error !== "attributes_required" && json.error !== "credential_required") {
    throw { code: json.error, desc: (json.error_description||"").split("\r\n")[0], sub: json.suberror, raw: json };
  }
  return json;
}

/* SIGN-IN */
const SI = {
  initiate  : (username)                  => naPost("/oauth2/v2.0/initiate",
    { username, challenge_type: CHAL_TYPES }),
  challenge : (continuation_token)        => naPost("/oauth2/v2.0/challenge",
    { continuation_token, challenge_type: CHAL_TYPES }),
  tokenPw   : (continuation_token, password) => naPost("/oauth2/v2.0/token",
    { continuation_token, password, grant_type: "password", scope: SCOPES }),
  tokenOTP  : (continuation_token, oob)   => naPost("/oauth2/v2.0/token",
    { continuation_token, oob, grant_type: "urn:ietf:params:oauth:grant-type:oob", scope: SCOPES }),
};

/* SIGN-UP */
const SU = {
  // attrs = { givenName, surname, displayName, jobTitle, city, country, ... }
  // All sent as JSON-stringified `attributes` per Entra Native Auth spec.
  start: (username, password, attrs = {}) => naPost("/signup/v1.0/start", {
    username,
    challenge_type: CHAL_TYPES,
    ...(password ? { password } : {}),
    ...(Object.keys(attrs).length ? { attributes: JSON.stringify(attrs) } : {}),
  }),
  challenge : (continuation_token) => naPost("/signup/v1.0/challenge",
    { continuation_token, challenge_type: CHAL_TYPES }),
  contOTP   : (continuation_token, oob)      => naPost("/signup/v1.0/continue",
    { continuation_token, oob, grant_type: "oob" }),
  contPw    : (continuation_token, password) => naPost("/signup/v1.0/continue",
    { continuation_token, password, grant_type: "password" }),
  token     : (continuation_token)           => naPost("/oauth2/v2.0/token",
    { continuation_token, grant_type: "urn:ietf:params:oauth:grant-type:jwt-bearer", scope: SCOPES }),
};

/* SSPR */
const PR = {
  start     : (username)                      => naPost("/resetpassword/v1.0/start",
    { username, challenge_type: CHAL_TYPES }),
  challenge : (continuation_token)            => naPost("/resetpassword/v1.0/challenge",
    { continuation_token, challenge_type: CHAL_TYPES }),
  contOTP   : (continuation_token, oob)       => naPost("/resetpassword/v1.0/continue",
    { continuation_token, oob, grant_type: "oob" }),
  submit    : (continuation_token, new_password) => naPost("/resetpassword/v1.0/submit",
    { continuation_token, new_password }),
  poll      : (continuation_token)            => naPost("/resetpassword/v1.0/poll_completion",
    { continuation_token }),
};

/* JWT decode (display only – no signature verify) */
function jwtDecode(t) {
  try { return JSON.parse(atob(t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))); }
  catch { return {}; }
}

/* Password strength 0-4 */
function pwStr(p) {
  if (!p) return 0;
  return Math.min(4,
    (p.length >= 8 ? 1 : 0) +
    (p.length >= 12 ? 1 : 0) +
    (/[A-Z]/.test(p) && /[a-z]/.test(p) ? 1 : 0) +
    (/[^A-Za-z0-9]/.test(p) ? 1 : 0));
}
const STR_LBL = ["","Weak","Fair","Good","Strong"];
const STR_CLS = ["","lv1","lv2","lv3","lv4"];

/* ──────────────────────────────────────────────────────────
   HOOKS
────────────────────────────────────────────────────────── */
const { useState, useCallback, useRef, useEffect } = React;

/* ──────────────────────────────────────────────────────────
   SMALL SHARED COMPONENTS
────────────────────────────────────────────────────────── */
function Spin() { return <span className="spin" aria-hidden="true" />; }

function ErrBox({ e }) {
  if (!e) return null;
  const text = typeof e === "string" ? e : (e.desc || "An error occurred.");
  const hints = {
    network_error       : null,
    nativeauthapi_disabled : "Go to Azure Portal → App Registrations → Authentication → Enable native auth.",
    user_already_exists : "Account exists. Please sign in instead.",
    invalid_oob_value   : "Incorrect code — please try again.",
    password_too_weak   : "Password is too weak. Use uppercase, numbers and symbols.",
    password_too_short  : "Password must be at least 8 characters.",
  };
  const hint = e && e.code ? hints[e.code] : undefined;
  return (
    <div className="m-err" role="alert">
      <i className="fa-solid fa-circle-exclamation" />
      <div>
        <div>{text}</div>
        {hint && <div style={{marginTop:4,fontWeight:700,fontSize:12}}>{hint}</div>}
      </div>
    </div>
  );
}

/* Step indicator */
function Steps({ list, cur }) {
  return (
    <div className="steps-row">
      {list.map((label, i) => {
        const cls = i < cur ? "s-done" : i === cur ? "s-act" : "s-idle";
        return (
          <div key={label} className={`step-item ${cls}`}>
            <div className="step-dot">
              {i < cur ? <i className="fa-solid fa-check" style={{fontSize:9}} /> : i + 1}
            </div>
            <div className="step-lbl">{label}</div>
          </div>
        );
      })}
    </div>
  );
}

/* OTP digit-box input — CORRECT: single useRef holding array */
function OTPInput({ len = 8, value, onChange, autoFocus }) {
  const refsArr = useRef([]);

  const digits = (value || "").padEnd(len, " ").split("").slice(0, len);

  function handleChange(i, ev) {
    const ch = ev.target.value.replace(/[^0-9]/g, "").slice(-1);
    const next = [...digits];
    next[i] = ch || " ";
    onChange(next.join("").trimEnd());
    if (ch && i < len - 1) refsArr.current[i + 1] && refsArr.current[i + 1].focus();
  }

  function handleKey(i, ev) {
    if (ev.key === "Backspace") {
      const next = [...digits];
      if (next[i].trim()) { next[i] = " "; onChange(next.join("").trimEnd()); }
      else if (i > 0)     { refsArr.current[i - 1] && refsArr.current[i - 1].focus(); }
    }
    if (ev.key === "ArrowLeft"  && i > 0)     refsArr.current[i - 1] && refsArr.current[i - 1].focus();
    if (ev.key === "ArrowRight" && i < len-1) refsArr.current[i + 1] && refsArr.current[i + 1].focus();
  }

  function handlePaste(ev) {
    ev.preventDefault();
    const paste = ev.clipboardData.getData("text").replace(/[^0-9]/g, "").slice(0, len);
    onChange(paste);
    const fi = Math.min(paste.length, len - 1);
    refsArr.current[fi] && refsArr.current[fi].focus();
  }

  return (
    <div className="otp-wrap" role="group" aria-label="One-time passcode">
      {digits.map((d, i) => (
        <input
          key={i}
          ref={el => { refsArr.current[i] = el; }}
          type="text"
          inputMode="numeric"
          maxLength={1}
          className={"otp-box" + (d.trim() ? " filled" : "")}
          value={d.trim()}
          autoFocus={autoFocus && i === 0}
          onChange={ev => handleChange(i, ev)}
          onKeyDown={ev => handleKey(i, ev)}
          onPaste={handlePaste}
          aria-label={"Digit " + (i + 1)}
        />
      ))}
    </div>
  );
}

/* Countdown/resend */
function ResendTimer({ interval, onResend, busy }) {
  const [secs, setSecs] = useState(interval || 60);
  useEffect(() => {
    if (secs <= 0) return;
    const t = setTimeout(() => setSecs(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [secs]);
  const doResend = () => { setSecs(interval || 60); onResend(); };
  return (
    <div className="otp-resend">
      {secs > 0
        ? <span>Resend code in <strong>{secs}s</strong></span>
        : <button className="btn-ghost" onClick={doResend} disabled={busy}>
            <i className="fa-solid fa-rotate-right" style={{marginRight:4}} />Resend Code
          </button>
      }
    </div>
  );
}

/* Password field + optional strength meter */
function PwField({ id, label, value, onChange, meter, ph, complete }) {
  const [vis, setVis] = useState(false);
  const s = meter ? pwStr(value) : 0;
  return (
    <div className="fg">
      <label htmlFor={id}>{label}</label>
      <div className="pw-wrap">
        <input id={id} type={vis ? "text" : "password"} value={value}
          placeholder={ph || ""} autoComplete={complete || "current-password"}
          onChange={ev => onChange(ev.target.value)} />
        <button className="pw-toggle" type="button"
          onClick={() => setVis(v => !v)} aria-label={vis ? "Hide" : "Show"}>
          <i className={"fa-solid fa-eye" + (vis ? "-slash" : "")} />
        </button>
      </div>
      {meter && value && (
        <div className="pw-str">
          <div className="str-bars">
            {[1,2,3,4].map(n => (
              <div key={n} className={"str-bar" + (s >= n ? " " + STR_CLS[s] : "")} />
            ))}
          </div>
          <div className="str-lbl">{STR_LBL[s]}</div>
        </div>
      )}
    </div>
  );
}

/* ──────────────────────────────────────────────────────────
   SIGN-IN FLOW
   step 0: email OR username  →  step 1: password -or- OTP
────────────────────────────────────────────────────────── */
function SignInFlow({ onAuth, onGo }) {
  const [step,    setStep]  = useState(0);
  const [loginId, setLoginId] = useState("");   // accepts email OR username
  const [token,   setToken] = useState("");
  const [chal,    setChal]  = useState("");
  const [target,  setTgt]   = useState("");
  const [clen,    setClen]  = useState(8);
  const [ivl,     setIvl]   = useState(60);
  const [otp,     setOtp]   = useState("");
  const [pw,      setPw]    = useState("");
  const [busy,    setBusy]  = useState(false);
  const [err,     setErr]   = useState(null);

  // Entra Native Auth uses `username` for both email and UPN/alias identifiers.
  // We pass whatever the user typed directly — the API resolves it.
  async function goStep1() {
    setErr(null);
    const id = loginId.trim();
    if (!id) { setErr("Enter your email address or username."); return; }
    // Basic format check: email must have @, plain usernames must be non-empty strings
    if (id.includes("@") === false && id.length < 2) {
      setErr("Enter a valid email or username."); return;
    }
    setBusy(true);
    try {
      const r1 = await SI.initiate(id);
      if (r1.challenge_type === "redirect") { setErr("Tenant requires browser-based login."); return; }
      const r2 = await SI.challenge(r1.continuation_token);
      setToken(r2.continuation_token);
      setChal(r2.challenge_type);
      setTgt(r2.challenge_target_label || id);
      if (r2.code_length) setClen(r2.code_length);
      if (r2.interval)    setIvl(r2.interval);
      setStep(1);
    } catch (e) { setErr(e); }
    finally { setBusy(false); }
  }

  async function resend() {
    setBusy(true);
    try { const r = await SI.challenge(token); setToken(r.continuation_token); }
    catch (e) { setErr(e); }
    finally { setBusy(false); }
  }

  async function submit() {
    setErr(null);
    setBusy(true);
    try {
      const res = chal === "password"
        ? await SI.tokenPw(token, pw)
        : await SI.tokenOTP(token, otp.trim());
      onAuth({ idToken: res.id_token, accessToken: res.access_token, claims: jwtDecode(res.id_token) });
    } catch (e) { setErr(e); }
    finally { setBusy(false); }
  }

  const canSubmit = chal === "password" ? !!pw : otp.trim().length >= clen;

  return (
    <div className="acard">
      <div className="acard-head"><i className="fa-solid fa-shield-halved" />Member Login</div>
      <div className="acard-body">
        <Steps list={["Your Identity", "Verification"]} cur={step} />
        <ErrBox e={err} />

        {step === 0 && (
          <>
            <div className="fg">
              <label htmlFor="si-id">Email Address or Username</label>
              <input
                id="si-id"
                type="text"
                placeholder="your@email.com or username"
                value={loginId}
                onChange={ev => setLoginId(ev.target.value)}
                onKeyDown={ev => ev.key === "Enter" && goStep1()}
                autoCapitalize="none"
                autoCorrect="off"
                autoComplete="username"
                autoFocus
              />
            </div>
            <button className="btn-prim" onClick={goStep1} disabled={busy}>
              {busy && <Spin />}{busy ? "Checking…" : "Continue"}
            </button>
            <div className="link-row">
              <span className="lnk" onClick={() => onGo("resetpw")}>Forgot Password?</span>
              <span className="lnk" onClick={() => onGo("forgotuser")}>Forgot Username?</span>
            </div>
            <div className="dvdr">New Member?</div>
            <button className="btn-sec" onClick={() => onGo("register")}>Register Now</button>
          </>
        )}

        {step === 1 && chal === "password" && (
          <>
            <div className="m-info">
              <i className="fa-solid fa-user" /> Signing in as <strong>{loginId.trim()}</strong>
            </div>
            <PwField id="si-pw" label="Password" value={pw} onChange={setPw} ph="Your password" />
            <button className="btn-prim" onClick={submit} disabled={busy || !pw}>
              {busy && <Spin />}{busy ? "Signing in…" : "Login"}
            </button>
            <button className="btn-back" style={{marginTop:10}}
              onClick={() => { setStep(0); setErr(null); setPw(""); }}>
              <i className="fa-solid fa-arrow-left" />Back
            </button>
          </>
        )}

        {step === 1 && chal === "oob" && (
          <>
            <p className="otp-hint">
              We sent a <strong>{clen}-digit code</strong> to<br />
              <span className="otp-target">{target}</span>
            </p>
            <OTPInput len={clen} value={otp} onChange={setOtp} autoFocus />
            <button className="btn-prim" onClick={submit} disabled={busy || !canSubmit}>
              {busy && <Spin />}{busy ? "Verifying…" : "Verify & Sign In"}
            </button>
            <ResendTimer interval={ivl} onResend={resend} busy={busy} />
            <button className="btn-back" style={{marginTop:10}}
              onClick={() => { setStep(0); setOtp(""); setErr(null); }}>
              <i className="fa-solid fa-arrow-left" />Back
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────
   REGISTER FLOW
   step 0: details  →  step 1: verify OTP  →  step 2: success
────────────────────────────────────────────────────────── */
function RegisterFlow({ onBack, onAuth, onGo }) {
  const [step,        setStep]       = useState(0);
  // Form fields — matching the working test form
  const [flatUsername,setFlatUsername] = useState("");
  const [firstName,   setFirstName]  = useState("");
  const [lastName,    setLastName]   = useState("");
  const [jobTitle,    setJobTitle]   = useState("");
  const [city,        setCity]       = useState("");
  const [country,     setCountry]    = useState("");
  const [email,       setEmail]      = useState("");
  const [pw,          setPw]         = useState("");
  const [pwc,         setPwc]        = useState("");
  // Internal flow state
  const [tok,         setTok]        = useState("");
  const [otp,         setOtp]        = useState("");
  const [clen,        setClen]       = useState(8);
  const [tgt,         setTgt]        = useState("");
  const [ivl,         setIvl]        = useState(60);
  const [busy,        setBusy]       = useState(false);
  const [err,         setErr]        = useState(null);
  const [userExists,  setUserExists] = useState(false);

  function resetForm() {
    setFlatUsername(""); setFirstName(""); setLastName("");
    setJobTitle(""); setCity(""); setCountry(""); setEmail("");
    setPw(""); setPwc(""); setErr(null); setUserExists(false);
  }

  async function startReg() {
    setErr(null);
    setUserExists(false);
    if (!firstName.trim())  { setErr("Please enter your first name."); return; }
    if (!lastName.trim())   { setErr("Please enter your last name."); return; }
    if (!email.includes("@")) { setErr("Enter a valid email address."); return; }
    if (pw.length < 8)      { setErr("Password must be at least 8 characters."); return; }
    if (pw !== pwc)         { setErr("Passwords do not match."); return; }

    // Build the attributes object — map form fields to Entra attribute names
    const attrs = {
      displayName : (firstName.trim() + " " + lastName.trim()),
      givenName   : firstName.trim(),
      surname     : lastName.trim(),
      ...(jobTitle.trim()     ? { jobTitle     : jobTitle.trim() }     : {}),
      ...(city.trim()         ? { city         : city.trim() }         : {}),
      ...(country.trim()      ? { country      : country.trim() }      : {}),
      // flatUsername maps to a custom extension attribute in your tenant
      ...(flatUsername.trim() ? { extension_alias : flatUsername.trim() } : {}),
    };

    setBusy(true);
    try {
      const r1 = await SU.start(email.trim(), pw, attrs);
      const r2 = await SU.challenge(r1.continuation_token);
      setTok(r2.continuation_token);
      setTgt(r2.challenge_target_label || email);
      if (r2.code_length) setClen(r2.code_length);
      if (r2.interval)    setIvl(r2.interval);
      setStep(1);
    } catch (e) {
      console.warn("[RegisterFlow] SU.start error:", e);
      if (e.raw) console.warn("[RegisterFlow] Raw API response:", JSON.stringify(e.raw, null, 2));
      if (e.code === "user_already_exists") {
        setUserExists(true);
      } else {
        setErr(e);
      }
    }
    finally { setBusy(false); }
  }

  async function resend() {
    setBusy(true);
    try { const r = await SU.challenge(tok); setTok(r.continuation_token); }
    catch (e) { setErr(e); }
    finally { setBusy(false); }
  }

  async function verifyOTP() {
    setErr(null);
    if (otp.trim().length < clen) { setErr("Please enter the full code."); return; }
    setBusy(true);
    try {
      const r1 = await SU.contOTP(tok, otp.trim());
      const finalTok = r1.continuation_token || tok;
      try {
        const res = await SU.token(finalTok);
        onAuth({ idToken: res.id_token, accessToken: res.access_token, claims: jwtDecode(res.id_token) });
      } catch {
        setStep(2);
      }
    } catch (e) { setErr(e); }
    finally { setBusy(false); }
  }

  return (
    <div className="acard">
      <div className="acard-head"><i className="fa-solid fa-user-plus" />New Member Registration</div>
      <div className="acard-body">
        {step < 2 && <Steps list={["Your Details","Verify Email","Done"]} cur={step} />}
        {step < 2 && (
          <button className="btn-back"
            onClick={() => { setErr(null); setUserExists(false); step === 0 ? onBack() : setStep(s => s - 1); }}>
            <i className="fa-solid fa-arrow-left" />{step === 0 ? "Back to Sign In" : "Back"}
          </button>
        )}
        <ErrBox e={err} />

        {/* ── Step 0: Registration form ── */}
        {step === 0 && (
          <>
            {/* User-already-exists banner */}
            {userExists && (
              <div style={{background:"#fff8f0",border:"1px solid #f9c97c",borderRadius:6,padding:"14px 16px",marginBottom:14}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:9,marginBottom:12}}>
                  <i className="fa-solid fa-circle-exclamation" style={{color:"#d97706",marginTop:2,flexShrink:0}} />
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:"#92400e"}}>
                      An account with <strong>{email}</strong> already exists.
                    </div>
                    <div style={{fontSize:13,color:"#78350f",marginTop:3,lineHeight:1.5}}>
                      This could mean you registered before, or this email is linked to a Microsoft account.
                      Try signing in, or reset your password if you've forgotten it.
                    </div>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexDirection:"column"}}>
                  <button className="btn-prim" onClick={onBack}>
                    <i className="fa-solid fa-right-to-bracket" style={{marginRight:6}} />Sign In with this Email
                  </button>
                  <button className="btn-sec" onClick={() => onGo("resetpw")}>
                    <i className="fa-solid fa-key" style={{marginRight:6}} />Forgot Password? Reset it
                  </button>
                  <button className="btn-ghost" style={{marginTop:4}} onClick={resetForm}>
                    Try a different email address
                  </button>
                </div>
              </div>
            )}

            {/* Registration form — hidden once userExists */}
            {!userExists && (
              <>
                {/* Row: First + Last name side by side */}
                <div style={{display:"flex",gap:10}}>
                  <div className="fg" style={{flex:1}}>
                    <label htmlFor="ru-fn">First Name *</label>
                    <input id="ru-fn" type="text" placeholder="First name"
                      value={firstName} onChange={ev => setFirstName(ev.target.value)} autoFocus />
                  </div>
                  <div className="fg" style={{flex:1}}>
                    <label htmlFor="ru-ln">Last Name *</label>
                    <input id="ru-ln" type="text" placeholder="Last name"
                      value={lastName} onChange={ev => setLastName(ev.target.value)} />
                  </div>
                </div>
                <div className="fg">
                  <label htmlFor="ru-alias">Username / Alias</label>
                  <input id="ru-alias" type="text" placeholder="Preferred username (optional)"
                    value={flatUsername} onChange={ev => setFlatUsername(ev.target.value)} />
                </div>
                <div className="fg">
                  <label htmlFor="ru-job">Job Title *</label>
                  <input id="ru-job" type="text" placeholder="Your job title"
                    value={jobTitle} onChange={ev => setJobTitle(ev.target.value)} />
                </div>
                {/* Row: City + Country side by side */}
                <div style={{display:"flex",gap:10}}>
                  <div className="fg" style={{flex:1}}>
                    <label htmlFor="ru-city">City *</label>
                    <input id="ru-city" type="text" placeholder="City"
                      value={city} onChange={ev => setCity(ev.target.value)} />
                  </div>
                  <div className="fg" style={{flex:1}}>
                    <label htmlFor="ru-country">Country *</label>
                    <input id="ru-country" type="text" placeholder="Country"
                      value={country} onChange={ev => setCountry(ev.target.value)} />
                  </div>
                </div>
                <div className="fg">
                  <label htmlFor="ru-em">Email Address *</label>
                  <input id="ru-em" type="email" placeholder="your@email.com"
                    value={email} onChange={ev => setEmail(ev.target.value)} autoComplete="username" />
                </div>
                <PwField id="ru-pw"  label="Create Password *"  value={pw}  onChange={setPw}  meter ph="Min. 8 characters" complete="new-password" />
                <PwField id="ru-pwc" label="Confirm Password *" value={pwc} onChange={setPwc} ph="Repeat password" complete="new-password" />
                <button className="btn-prim" onClick={startReg} disabled={busy}>
                  {busy && <Spin />}{busy ? "Creating Account…" : "Sign Up"}
                </button>
              </>
            )}
          </>
        )}

        {/* ── Step 1: OTP verification ── */}
        {step === 1 && (
          <>
            <p className="otp-hint">
              Check your inbox — we sent a <strong>{clen}-digit code</strong> to<br />

            <OTPInput len={clen} value={otp} onChange={setOtp} autoFocus />
            <button className="btn-prim" onClick={verifyOTP} disabled={busy || otp.trim().length < clen}>
              {busy && <Spin />}{busy ? "Verifying…" : "Verify Email"}
            </button>
            <ResendTimer interval={ivl} onResend={resend} busy={busy} />
          </>
        )}

        {/* ── Step 2: Success ── */}
        {step === 2 && (
          <div className="m-ok">
            <div style={{fontSize:40,marginBottom:10}}>🎉</div>

            <button className="btn-prim" onClick={onBack}>Sign In Now</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────
   RESET PASSWORD (SSPR) FLOW
   step 0: email  → 1: OTP  → 2: new pw  → 3: done
────────────────────────────────────────────────────────── */
function ResetPwFlow({ onBack }) {
  const [step,    setStep]  = useState(0);
  const [email,   setEmail] = useState("");
  const [tok,     setTok]   = useState("");
  const [otp,     setOtp]   = useState("");
  const [clen,    setClen]  = useState(8);
  const [tgt,     setTgt]   = useState("");
  const [ivl,     setIvl]   = useState(60);
  const [pw,      setPw]    = useState("");
  const [pwc,     setPwc]   = useState("");
  const [busy,    setBusy]  = useState(false);
  const [polling, setPoll]  = useState(false);
  const [err,     setErr]   = useState(null);

  async function startReset() {
    setErr(null);
    if (!email.includes("@")) { setErr("Enter a valid email address."); return; }
    setBusy(true);
    try {
      const r1 = await PR.start(email.trim());
      const r2 = await PR.challenge(r1.continuation_token);
      setTok(r2.continuation_token);
      setTgt(r2.challenge_target_label || email);
      if (r2.code_length) setClen(r2.code_length);
      if (r2.interval)    setIvl(r2.interval);
      setStep(1);
    } catch (e) { setErr(e); }
    finally { setBusy(false); }
  }

  async function resend() {
    setBusy(true);
    try { const r = await PR.challenge(tok); setTok(r.continuation_token); }
    catch (e) { setErr(e); }
    finally { setBusy(false); }
  }

  async function verifyOTP() {
    setErr(null);
    if (otp.trim().length < clen) { setErr("Enter the full code."); return; }
    setBusy(true);
    try {
      const r = await PR.contOTP(tok, otp.trim());
      setTok(r.continuation_token);
      setStep(2);
    } catch (e) { setErr(e); }
    finally { setBusy(false); }
  }

  async function submitPw() {
    setErr(null);
    if (pw.length < 8) { setErr("Password must be at least 8 characters."); return; }
    if (pw !== pwc)    { setErr("Passwords do not match."); return; }
    setBusy(true);
    try {
      const r = await PR.submit(tok, pw);
      let pTok = r.continuation_token || tok;
      setPoll(true);
      for (let i = 0; i < 12; i++) {
        await new Promise(res => setTimeout(res, 1500));
        const p = await PR.poll(pTok);
        if (p.status === "succeeded" || p.poll_interval === 0) break;
        if (p.continuation_token) pTok = p.continuation_token;
      }
      setPoll(false);
      setStep(3);
    } catch (e) { setPoll(false); setErr(e); }
    finally { setBusy(false); }
  }

  return (
    <div className="acard">
      <div className="acard-head"><i className="fa-solid fa-key" />Reset Password</div>
      <div className="acard-body">
        {step < 3 && <Steps list={["Email","Verify OTP","New Password","Done"]} cur={step} />}
        {step < 3 && (
          <button className="btn-back"
            onClick={() => { setErr(null); step === 0 ? onBack() : setStep(s => s - 1); }}>
            <i className="fa-solid fa-arrow-left" />{step === 0 ? "Back to Sign In" : "Back"}
          </button>
        )}
        <ErrBox e={err} />

        {step === 0 && (
          <>
            <p style={{fontSize:14,color:"#555",lineHeight:1.7,marginBottom:13}}>
              Enter your registered email. We'll send a one-time code to reset your password.
            </p>
            <div className="fg">
              <label htmlFor="rp-em">Email Address</label>
              <input id="rp-em" type="email" placeholder="your@email.com"
                value={email} onChange={ev => setEmail(ev.target.value)}
                onKeyDown={ev => ev.key === "Enter" && startReset()} autoFocus />
            </div>
            <button className="btn-prim" onClick={startReset} disabled={busy}>
              {busy && <Spin />}{busy ? "Sending…" : "Send Reset Code"}
            </button>
          </>
        )}

        {step === 1 && (
          <>
            <p className="otp-hint">
              Enter the <strong>{clen}-digit code</strong> sent to<br />
              <span className="otp-target">{tgt}</span>
            </p>
            <OTPInput len={clen} value={otp} onChange={setOtp} autoFocus />
            <button className="btn-prim" onClick={verifyOTP} disabled={busy || otp.trim().length < clen}>
              {busy && <Spin />}{busy ? "Verifying…" : "Verify Code"}
            </button>
            <ResendTimer interval={ivl} onResend={resend} busy={busy} />
          </>
        )}

        {step === 2 && (
          <>
            <div className="m-info"><i className="fa-solid fa-circle-check" />Identity confirmed. Create your new password.</div>
            <PwField id="np-pw"  label="New Password"         value={pw}  onChange={setPw}  meter ph="Min. 8 characters" complete="new-password" />
            <PwField id="np-pwc" label="Confirm New Password" value={pwc} onChange={setPwc} ph="Repeat password"         complete="new-password" />
            <button className="btn-prim" onClick={submitPw} disabled={busy || polling}>
              {(busy || polling) && <Spin />}
              {polling ? "Applying…" : busy ? "Saving…" : "Reset Password"}
            </button>
          </>
        )}

        {step === 3 && (
          <div className="m-ok">
            <div style={{fontSize:40,marginBottom:10}}>✅</div>
            <strong>Password Reset Successfully!</strong><br />
            You can now sign in with your new password.<br /><br />
            <button className="btn-prim" onClick={onBack}>Sign In Now</button>
          </div>
        )}
      </div>
    </div>
  );
}

function TopBar() {
  function changeFont(d) {
    const cur = parseFloat(document.documentElement.style.fontSize) || 100;
    document.documentElement.style.fontSize = (d === 0 ? 100 : Math.min(130, Math.max(85, cur + d * 5))) + "%";
  }
  return (
    <div className="topbar">
      <div className="tb-in">
        <span style={{opacity:.8}}>Text Size</span>
        <button className="tb-btn" onClick={() => changeFont(-1)} aria-label="Decrease font">−</button>
        <button className="tb-btn" onClick={() => changeFont(0)}  aria-label="Reset font">↺</button>
        <button className="tb-btn" onClick={() => changeFont(1)}  aria-label="Increase font">+</button>
        <span style={{opacity:.25}}>|</span>
        <span style={{opacity:.8,display:"flex",alignItems:"center",gap:5}}>
          <img src={window.ASSETS.langIco} alt="" style={{width:15,height:15}} /> English
        </span>
      </div>
    </div>
  );
}

      case "resetpw":    return <ResetPwFlow  onBack={() => setScreen("signin")} />;

      default:           return <SignInFlow onAuth={handleAuth} onGo={setScreen} />;
    }

    <>
      <TopBar />

        <div className="cors-bar">
          <i className="fa-solid fa-triangle-exclamation" />
          <span>
            <strong>Proxy required —</strong> Native Auth API blocks CORS in browsers.
            Run <code>node proxy-server.js</code> then set <code>PROXY = "http://localhost:3001/proxy"</code> in this file.
          </span>
        </div>
      )}

      <SiteHeader sess={sess} onSignOut={handleSignOut} />

      <main style={{flex:1}}>

          <Dashboard sess={sess} />
        ) : (

              </h1>
              <p className="hero-sub">
                Liberty wants to get you the information you need, when you need it.
                Look for a dentist, read about your benefits, download your Member ID Card, and more!
                {" "}<strong>24 hours a day, 7 days a week.</strong>
              </p>
              <div className="hero-feats">
                {[
                  ["fa-tooth",            "Find In-Network Dentists",  "Search by location, specialty or name"],
                  ["fa-id-card",          "Digital Member ID Card",    "Access your card anytime, anywhere"],
                  ["fa-file-medical",     "Benefits & Coverage",       "Review what's covered under your plan"],
                  ["fa-clock-rotate-left","Claims Tracking",           "Monitor submitted claims in real time"],
                ].map(([ic, t, d]) => (

                    <div className="hf-ic"><i className={"fa-solid " + ic} /></div>

            <div style={{display:"flex",flexDirection:"column",gap:10}}>

                <div className="al al-info" role="alert">

}
